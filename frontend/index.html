<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="centraliza">
        <h1 class="titulo">
            Lista de Tarefas
        </h1>

        
    </div>

    <div class="centraliza">
        <input  type="text" id="texto" placeholder="Digite algo" class="input"/>

            <button onclick = "adicionar()" class="botaoadd">
 adicionar
    </button>

    <button onclick="remover()" class="botaoremover">
  remover
</button>

    </div>



<ul id="lista"></ul>

<script>
  function adicionar() {

    const valor = document.getElementById("texto").value;

    document.getElementById("lista").innerHTML +=
      "<li>" + valor + "</li>";
  }
</script>

<script>
function remover() {
  const lista = document.getElementById("lista");
  lista.removeChild(lista.lastElementChild);
}
</script>
    




    <div>
        
    </div>

</body>
</html>
